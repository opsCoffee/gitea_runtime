name: Build and Push Docker Images

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
    paths:
      - '.github/workflows/build.yml'
      - 'scripts/**'
      - 'tests/**'
      - 'runtime-*/**'
  pull_request:
    branches: [ master, main ]
    paths:
      - '.github/workflows/build.yml'
      - 'scripts/**'
      - 'tests/**'
      - 'runtime-*/**'
  schedule:
    - cron: '0 2 * * 1'

env:
  REGISTRY: git.httpx.online
  REGISTRY_NAMESPACE: kenyon
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Add required permissions for security scanning
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  verify-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify workflow config matches shared config
        run: |
          chmod +x ./scripts/ci/verify_workflow_config.sh
          ./scripts/ci/verify_workflow_config.sh

      - name: Verify Dockerfile safety rules
        run: |
          chmod +x ./scripts/ci/verify_dockerfile_safety.sh
          ./scripts/ci/verify_dockerfile_safety.sh

      - name: Run CLI smoke tests
        run: |
          bash ./tests/smoke/runtimectl_smoke.sh

  build:
    needs: verify-config
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [markdown, asustor, template, latex, base, maven, claudecode]
    outputs:
      image_tag: ${{ steps.get_sha.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get commit SHA
        id: get_sha
        run: echo "sha=$(echo ${GITHUB_SHA::7})" >> $GITHUB_OUTPUT

      - name: Set image variables
        run: |
          chmod +x ./scripts/ci/image_env.sh
          ./scripts/ci/image_env.sh "${{ matrix.runtime }}" "${{ steps.get_sha.outputs.sha }}" "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image locally
        id: build_step
        timeout-minutes: ${{ matrix.runtime == 'latex' && 120 || 60 }}
        run: |
          # 为LaTeX镜像设置更多的Docker构建资源
          if [ "${{ matrix.runtime }}" = "latex" ]; then
            export DOCKER_BUILDKIT=1
            export BUILDX_NO_DEFAULT_ATTESTATIONS=1
          fi
          # 使用单平台构建以便能够加载到本地 Docker daemon
          bash ./scripts/runtimectl.sh build --only ${{ matrix.runtime }} --tag ${{ steps.get_sha.outputs.sha }} --platforms linux/amd64
          
      - name: Export built image
        run: |
          # 导出镜像为 tar 文件，供后续 job 使用
          chmod +x ./scripts/ci/save_image_artifact.sh
          ./scripts/ci/save_image_artifact.sh "$IMAGE_REF" "$IMAGE_TAR"
          
      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.runtime }}-image
          path: ${{ matrix.runtime }}-image.tar
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        runtime: [markdown, asustor, template, latex, base, maven, claudecode]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.runtime }}-image

      - name: Set image variables
        run: |
          chmod +x ./scripts/ci/image_env.sh
          ./scripts/ci/image_env.sh "${{ matrix.runtime }}" "${{ needs.build.outputs.image_tag }}" "$GITHUB_ENV"
          
      - name: Load Docker image
        run: |
          # 加载之前构建的镜像
          chmod +x ./scripts/ci/load_image_artifact.sh
          ./scripts/ci/load_image_artifact.sh "$IMAGE_TAR" "$IMAGE_REPO"

      - name: Run tests on local image
        timeout-minutes: ${{ matrix.runtime == 'maven' && 20 || 15 }}
        run: |
          bash ./scripts/runtimectl.sh test --only ${{ matrix.runtime }} --image-name "$IMAGE_REPO" --tag ${{ needs.build.outputs.image_tag }}

      - name: Security scan with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/gitea-runtime-${{ matrix.runtime }}:${{ needs.build.outputs.image_tag }}'
          format: 'sarif'
          output: '${{ env.SARIF_FILE }}'
          severity: 'CRITICAL,HIGH'
          cache: 'false'
        continue-on-error: true

      - name: Check if SARIF file exists
        id: check_sarif
        run: |
          if [ -f "$SARIF_FILE" ]; then
            echo "sarif_exists=true" >> $GITHUB_OUTPUT
            echo "SARIF file found"
            ls -la "$SARIF_FILE"
          else
            echo "sarif_exists=false" >> $GITHUB_OUTPUT
            echo "SARIF file not found"
            ls -la
          fi

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: steps.check_sarif.outputs.sarif_exists == 'true'
        with:
          sarif_file: '${{ env.SARIF_FILE }}'
        continue-on-error: true

  push-release:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.build.result == 'success' && (needs.test.result == 'success' || needs.test.result == 'skipped')
    strategy:
      matrix:
        runtime: [markdown, asustor, template, latex, base, maven, claudecode]
    timeout-minutes: ${{ matrix.runtime == 'latex' && 120 || ((matrix.runtime == 'maven' || matrix.runtime == 'claudecode') && 90 || 60) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image variables
        id: vars
        run: |
          echo "sha=$(echo ${GITHUB_SHA::7})" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          echo "IMAGE_REPO=${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/gitea-runtime-${{ matrix.runtime }}" >> $GITHUB_ENV

      # 下载已构建和测试过的镜像
      - name: Download tested image artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.runtime }}-image
          
      - name: Push release images with latest and date tags only
        run: |
          DATE_TAG="v${{ steps.vars.outputs.date }}"
          chmod +x ./scripts/ci/push_release_image.sh
          ./scripts/ci/push_release_image.sh "${{ matrix.runtime }}" "$IMAGE_REPO" "${{ needs.build.outputs.image_tag }}" "$DATE_TAG"
